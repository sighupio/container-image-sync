images:
  # SUCCESS SCENARIOS - These should work correctly

  - name: "[TEST] Pull-based single-arch sync"
    source: docker.io/library/alpine
    tag:
      - "3.18"
    destinations:
      - registry.sighup.io/fury/testing/alpine

  - name: "[TEST] Pull-based multi-arch sync"
    source: docker.io/library/alpine
    multi-arch: true
    tag:
      - "3.19"
    destinations:
      - registry.sighup.io/fury/testing/alpine

  - name: "[TEST] Build-based single-arch sync"
    source: test-build
    multi-arch: false
    build:
      context: custom/valid-build
      args:
        - name: TEST_ARG
          value: single-arch-test
    tag:
      - "single"
    destinations:
      - registry.sighup.io/fury/testing/build-test

  - name: "[TEST] Build-based multi-arch sync"
    source: test-build-multiarch
    multi-arch: true
    build:
      context: custom/valid-build
      args:
        - name: TEST_ARG
          value: multi-arch-test
    tag:
      - "multi"
    destinations:
      - registry.sighup.io/fury/testing/build-test

  # Exercises build.git_source AND build.pre_build_commands. The script must
  # clone the external repo at the given ref into a tempdir, run the pre-build
  # commands sequentially in dirname(context), and then use <tempdir>/<context>
  # as the docker build context. The tempdir must be removed at the end.
  - name: "[TEST] Build-based git_source sync"
    source: test-build-gitsource
    multi-arch: false
    build:
      git_source:
        repo: https://github.com/docker-library/hello-world.git
        ref: master
      # Benign side-effect-free command, only used to verify the
      # pre_build_commands code path is exercised in the test suite.
      pre_build_commands:
        - "ls -la"
      context: amd64/hello-world
      args:
        - name: TEST_ARG
          value: git-source-test
    tag:
      - "gitsource"
    destinations:
      - registry.sighup.io/fury/testing/build-test

  # ERROR SCENARIOS - These should fail gracefully

  - name: "[TEST] Invalid source image (should fail)"
    source: docker.io/nonexistent/invalid-image-for-testing
    tag:
      - "nonexistent-tag"
    destinations:
      - registry.sighup.io/fury/testing/should-fail

  - name: "[TEST] Missing build context (should fail)"
    source: test-invalid-build
    build:
      context: custom/nonexistent-build-context
    tag:
      - "should-fail"
    destinations:
      - registry.sighup.io/fury/testing/build-fail